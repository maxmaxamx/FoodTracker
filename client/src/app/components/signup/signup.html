<app-header></app-header>

<section class="hero">
    <div class="content">
        <div class="section-block login-section" id="login">
            <h2 class="section-title login-title">Регистрация акканунта</h2>

            <form class="login-form" onsubmit="return false;">
                <div class="form-group">
                    <label class="form-label" for="email">Электронная почта</label>
                    <div class="input-wrapper">
                        <span class="input-icon">📧</span>
                        <input type="email" id="email" class="form-input" placeholder="example@mail.com" required />
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="email">Имя</label>
                    <div class="input-wrapper">
                        <span class="input-icon">📧</span>
                        <input type="email" id="email" class="form-input" placeholder="example@mail.com" required />
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="password">Пароль</label>
                    <div class="input-wrapper">
                        <span class="input-icon">🔒</span>
                        <input [type]="passType" id="password" class="form-input" placeholder="Введите пароль"
                            required />
                        <button type="button" class="toggle-password" (click)="togglePasswordVisibility()"
                            routerLink="/twofa">
                            <span class="eye-icon" id="eyeIcon">{{passIcon}}</span>
                        </button>
                    </div>
                </div>

                <!-- <div class="form-options">
                    <label class="remember-me">
                        <input type="checkbox" id="remember" />
                        <span>Запомнить меня</span>
                    </label>
                    <a href="#" class="forgot-link">Забыли пароль?</a>
                </div> -->

                <button type="submit" class="login-btn">
                    <span class="btn-text">Войти</span>
                    <span class="btn-arrow">→</span>
                </button>
            </form>

            <div class="divider-line">
                <span>или</span>
            </div>
